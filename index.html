<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jalibor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#F0F4F8;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
.logo{font-size:42px;font-weight:900;letter-spacing:-2px;margin-bottom:6px}
.logo em{color:#41B4D3;font-style:normal}
.sub{font-size:10px;letter-spacing:3px;color:rgba(144,164,174,.45);text-transform:uppercase;margin-bottom:48px;font-family:monospace}
.links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
a{display:inline-block;padding:13px 26px;border-radius:8px;text-decoration:none;font-weight:700;font-size:13px;transition:all .2s;letter-spacing:.5px}
.p{background:#41B4D3;color:#000}.p:hover{background:#6ECDE6}
.s{border:1px solid rgba(65,180,211,.3);color:#41B4D3}.s:hover{background:rgba(65,180,211,.08)}
</style>
</head>
<body>
<div>
  <div class="logo">Jali<em>bor</em></div>
  <div class="sub">Urban Intelligence Infrastructure</div>
  <div class="links">
    <a href="app/" class="p">App</a>
    <a href="enterprise/" class="s">Enterprise</a>
    <a href="web/" class="s">Web3</a>
  </div>
</div>
</body>
</html>
